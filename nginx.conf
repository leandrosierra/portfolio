# nginx config — minimaliste, securisee.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Charset par defaut
    charset utf-8;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Headers de securite — declares au niveau server pour les reponses qui
    # ne passent pas par un location avec add_header propre.
    include /etc/nginx/snippets/security_headers.conf;

    # Cache long sur le HTML statique mais avec must-revalidate -- comme
    # ca un push edit propage sous 1 minute via Coolify deploy.
    # NB: ce location redeclare un add_header (Cache-Control), donc nginx
    # n'herite plus des add_header du server -> on re-include les headers.
    location = / {
        include /etc/nginx/snippets/security_headers.conf;
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        try_files /index.html =404;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloque les fichiers caches qui ne devraient pas etre servis.
    location ~ /\. {
        deny all;
        return 404;
    }
}
