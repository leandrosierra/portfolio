# nginx config — minimaliste, securisee.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Charset par defaut
    charset utf-8;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Headers de securite
    # CSP : whitelist Google Fonts uniquement (font CSS + woff2) -- aucun
    # JS externe charge. nginx exige UNE seule chaine (pas de concatenation
    # de strings adjacentes comme en C/Python) -> tout sur une ligne.
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; script-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Cache long sur le HTML statique mais avec must-revalidate -- comme
    # ca un push edit propage sous 1 minute via Coolify deploy.
    location = / {
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        try_files /index.html =404;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloque les fichiers caches qui ne devraient pas etre servis.
    location ~ /\. {
        deny all;
        return 404;
    }
}
